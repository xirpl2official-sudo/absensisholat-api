  /siswa/{nis}:
    delete:
      consumes:
      - application/json
      description: Menghapus siswa dari sistem secara permanen. Operasi ini akan menghapus
        semua data terkait siswa termasuk akun login dan absensi. Hati-hati karena
        operasi ini tidak dapat dibatalkan
      parameters:
      - description: NIS Siswa yang akan dihapus
        in: path
        name: nis
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Siswa berhasil dihapus - Data siswa telah dihapus dari sistem
          schema:
            $ref: '#/definitions/handlers.SiswaDeleteResponse'
        "400":
          description: Permintaan tidak valid - NIS kosong atau tidak diberikan
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "404":
          description: Siswa tidak ditemukan - NIS tidak ada dalam database
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "500":
          description: Kesalahan server internal - Database error atau cascade delete
            error
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
      summary: Hapus data siswa
      tags:
      - siswa
    get:
      consumes:
      - application/json
      description: Mengambil detail siswa spesifik berdasarkan nomor induk siswa (NIS).
        Mengembalikan profil lengkap siswa termasuk nama, jenis kelamin, jurusan,
        dan kelas
      parameters:
      - description: NIS Siswa - nomor induk siswa 4-20 digit
        in: path
        name: nis
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Data siswa ditemukan dan berhasil diambil
          schema:
            $ref: '#/definitions/handlers.SiswaDetailResponse'
        "400":
          description: NIS tidak valid atau kosong - parameter path tidak diberikan
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "404":
          description: Siswa tidak ditemukan - NIS tidak ada dalam database
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "500":
          description: Kesalahan server internal - Database connection error atau
            query error
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
      summary: Ambil data siswa berdasarkan NIS
      tags:
      - siswa
    put:
      consumes:
      - application/json
      description: Memperbarui informasi siswa yang sudah terdaftar. NIS tidak dapat
        diubah (primary key). Hanya nama_siswa, jk, jurusan, dan kelas yang dapat
        diperbarui
      parameters:
      - description: NIS Siswa yang akan diupdate
        in: path
        name: nis
        required: true
        type: string
      - description: Data siswa yang diperbarui - nama_siswa, jk, jurusan, kelas dapat
          diubah
        in: body
        name: student
        required: true
        schema:
          $ref: '#/definitions/models.Siswa'
      produces:
      - application/json
      responses:
        "200":
          description: Siswa berhasil diperbarui - Mengembalikan data siswa terbaru
          schema:
            $ref: '#/definitions/handlers.SiswaUpdateResponse'
        "400":
          description: Permintaan tidak valid - Format JSON salah atau NIS kosong
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "404":
          description: Siswa tidak ditemukan - NIS tidak ada dalam database
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "500":
          description: Kesalahan server internal - Database error atau constraint
            violation
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
      summary: Ubah data siswa
      tags:
      - siswa
  /siswa/{nis}/absensi:
    post:
      consumes:
      - application/json
      description: 'Siswa membuat pencatatan absensi (kehadiran/ketidakhadiran) untuk
        sesi sholat. Status yang valid adalah: hadir, izin, sakit, alpha'
      parameters:
      - description: NIS Siswa - nomor induk siswa
        in: path
        name: nis
        required: true
        type: string
      - description: Data absensi siswa
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAbsensiRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Absensi berhasil dibuat
          schema:
            $ref: '#/definitions/handlers.AbsensiResponse'
        "400":
          description: Request tidak valid atau data tidak lengkap
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "404":
          description: Siswa atau jadwal sholat tidak ditemukan
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
        "500":
          description: Kesalahan server internal
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
      summary: Buat absensi sholat baru untuk siswa
      tags:
      - absensi
  /statistics:
    get:
      consumes:
      - application/json
      description: Mengambil statistik absensi sholat untuk hari ini termasuk total
        absen, total kehadiran, persentase kehadiran, dan rata-rata kehadiran
      produces:
      - application/json
      responses:
        "200":
          description: Statistik berhasil diambil
          schema:
            $ref: '#/definitions/handlers.StatisticsResponse'
        "500":
          description: Kesalahan server internal
          schema:
            $ref: '#/definitions/handlers.SiswaErrorResponse'
      summary: Ambil statistik absensi hari ini
      tags:
      - statistics
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
