    get:
      consumes:
      - application/json
      description: Menghasilkan dan mendownload QR code sebagai file PNG untuk sesi
        absensi sholat aktif. Mengembalikan file PNG 256x256 pixel dengan error correction
        level Medium. QR code berisi token yang ter-sign dan berlaku selama 5 menit.
        Gunakan endpoint ini untuk mencetak atau menampilkan QR code di layar. Hanya
        untuk admin, guru, atau wali kelas
      parameters:
      - description: Set to 'true' to force-generate QR for testing (non-production
