basePath: /api
definitions:
  handlers.AbsensiHistoryItem:
    properties:
      deskripsi:
        type: string
      hari:
        type: string
      id_absen:
        type: integer
      jenis_sholat:
        type: string
      status:
        type: string
      tanggal:
        type: string
    type: object
  handlers.AbsensiResponse:
    properties:
      created_at:
        type: string
      deskripsi:
        type: string
      id_absen:
        type: integer
      id_jadwal:
        type: integer
      nis:
        type: string
      status:
        type: string
      tanggal:
        type: string
    type: object
  handlers.AbsensiStaffItem:
    properties:
      deskripsi:
        type: string
      hari:
        type: string
      id_absen:
        type: integer
      jenis_sholat:
        type: string
      jurusan:
        type: string
      kelas:
        type: string
      nama_siswa:
        type: string
      nis:
        type: string
      status:
        type: string
      tanggal:
        type: string
    type: object
  handlers.AppliedFilters:
    properties:
      jk:
        type: string
      jurusan:
        type: string
      kelas:
        type: string
      search:
        type: string
      sort_by:
        type: string
      sort_dir:
        type: string
    type: object
  handlers.ChangeEmailRequest:
    properties:
      new_email:
        type: string
    required:
    - new_email
    type: object
  handlers.CreateAbsensiRequest:
    properties:
      deskripsi:
        type: string
      id_jadwal:
        type: integer
      status:
        enum:
        - hadir
        - izin
        - sakit
        - alpha
        type: string
      tanggal:
        type: string
    required:
    - id_jadwal
    - status
    - tanggal
    type: object
  handlers.CreateUserStaffRequest:
    properties:
      name:
        description: Optional profile fields
        type: string
      nip:
        type: string
      password:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - password
    - role
    - username
    type: object
  handlers.ErrorResponse:
    properties:
      error: {}
      message:
        type: string
    type: object
  handlers.ForgotPasswordRequest:
    properties:
      email:
        type: string
      nis:
        type: string
    required:
    - email
    - nis
    type: object
  handlers.GenericDataResponse:
    properties:
      data: {}
    type: object
  handlers.HistoryFilters:
    properties:
      end_date:
        type: string
      jurusan:
        type: string
      kelas:
        type: string
      nis:
        type: string
      start_date:
        type: string
      status:
        type: string
    type: object
  handlers.HistorySiswaData:
    properties:
      absensi:
        items:
          $ref: '#/definitions/handlers.AbsensiHistoryItem'
        type: array
      end_date:
        type: string
      periode:
        type: string
      siswa:
        $ref: '#/definitions/handlers.SiswaInfo'
      start_date:
        type: string
      statistik:
        $ref: '#/definitions/handlers.HistoryStatistik'
    type: object
  handlers.HistorySiswaResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.HistorySiswaData'
      message:
        type: string
    type: object
  handlers.HistoryStaffData:
    properties:
      absensi:
        items:
          $ref: '#/definitions/handlers.AbsensiStaffItem'
        type: array
      filters:
        $ref: '#/definitions/handlers.HistoryFilters'
      pagination:
        $ref: '#/definitions/handlers.PaginationInfo'
      statistik:
        $ref: '#/definitions/handlers.LaporanStatistik'
    type: object
  handlers.HistoryStaffResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.HistoryStaffData'
      message:
        type: string
    type: object
  handlers.HistoryStatistik:
    properties:
      persentase_kehadiran:
        type: number
      total_absensi:
        type: integer
      total_alpha:
        type: integer
      total_hadir:
        type: integer
      total_izin:
        type: integer
      total_sakit:
        type: integer
    type: object
  handlers.JadwalDhuhaByJurusan:
    properties:
      jadwal:
        items:
          $ref: '#/definitions/models.JadwalSholat'
        type: array
      jurusan:
        type: string
    type: object
  handlers.JadwalDhuhaTodayResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/handlers.JadwalDhuhaByJurusan'
        type: array
      message:
        type: string
    type: object
  handlers.JadwalSholatCreateRequest:
    properties:
      hari:
        type: string
      jenis_sholat:
        type: string
      jurusan:
        type: string
      waktu_mulai:
        type: string
      waktu_selesai:
        type: string
    required:
    - hari
    - jenis_sholat
    - waktu_mulai
    - waktu_selesai
    type: object
  handlers.JadwalSholatErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  handlers.JadwalSholatFilters:
    properties:
      hari:
        type: string
      jenis_sholat:
        type: string
      jurusan:
        type: string
    type: object
  handlers.JadwalSholatListPaginatedResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.JadwalSholat'
        type: array
      filters:
        $ref: '#/definitions/handlers.JadwalSholatFilters'
      message:
        type: string
      pagination:
        $ref: '#/definitions/handlers.PaginationMeta'
    type: object
  handlers.JadwalSholatResponse:
    properties:
      data:
        $ref: '#/definitions/models.JadwalSholat'
      message:
        type: string
    type: object
  handlers.JadwalSholatUpdateRequest:
    properties:
      hari:
        type: string
      jenis_sholat:
        type: string
      jurusan:
        type: string
      waktu_mulai:
        type: string
      waktu_selesai:
        type: string
    type: object
  handlers.LaporanStatistik:
    properties:
      persentase_alpha:
        type: number
      persentase_hadir:
        type: number
      persentase_izin:
        type: number
      persentase_sakit:
        type: number
      rata_rata_kehadiran:
        type: number
      total_absensi:
        type: integer
      total_alpha:
        type: integer
      total_hadir:
        type: integer
      total_izin:
        type: integer
      total_sakit:
        type: integer
      total_siswa:
        type: integer
    type: object
  handlers.LoginRequest:
    properties:
      identifier:
        description: NIS for siswa, username for admin/guru
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  handlers.LoginResponse:
    properties:
      email:
        type: string
      id_staff:
        type: integer
      is_google_acct:
        type: boolean
      jk:
        type: string
      jurusan:
        type: string
      kelas:
        type: string
      nama_siswa:
        type: string
      name:
        type: string
      nip:
        type: string
      nis:
        type: string
      role:
        type: string
      token:
        type: string
      username:
        description: Staff fields
        type: string
    type: object
  handlers.LoginResponseData:
    properties:
      data:
        $ref: '#/definitions/handlers.LoginResponse'
      message:
        type: string
    type: object
  handlers.PaginationInfo:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  handlers.PaginationMeta:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  handlers.QRCodeData:
    properties:
      expires_at:
        type: string
      id_jadwal:
        type: integer
      jenis_sholat:
        type: string
      qr_code:
        type: string
      token:
        type: string
    type: object
  handlers.QRCodeResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.QRCodeData'
      message:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      nis:
        type: string
      password:
        type: string
    required:
    - email
    - nis
    - password
    type: object
  handlers.RegisterResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      is_google_acct:
        type: boolean
      message:
        type: string
      nis:
        type: string
    type: object
  handlers.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      nis:
        type: string
      otp:
        type: string
    required:
    - new_password
    - nis
    - otp
    type: object
  handlers.SQLQueryRequest:
    properties:
      query:
        type: string
    required:
    - query
    type: object
  handlers.SiswaCreateResponse:
    properties:
      data:
        $ref: '#/definitions/models.Siswa'
      message:
        type: string
    type: object
  handlers.SiswaDeleteResponse:
    properties:
      message:
        type: string
    type: object
  handlers.SiswaDetailResponse:
    properties:
      data:
        $ref: '#/definitions/models.Siswa'
      message:
        type: string
    type: object
  handlers.SiswaErrorResponse:
    properties:
      error: {}
      message:
        type: string
    type: object
  handlers.SiswaInfo:
    properties:
      jurusan:
        type: string
      kelas:
        type: string
      nama_siswa:
        type: string
      nis:
        type: string
    type: object
  handlers.SiswaListPaginatedResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Siswa'
        type: array
      filters:
        $ref: '#/definitions/handlers.AppliedFilters'
      message:
        type: string
      pagination:
        $ref: '#/definitions/handlers.PaginationMeta'
    type: object
  handlers.SiswaUpdateResponse:
    properties:
      data:
        $ref: '#/definitions/models.Siswa'
      message:
        type: string
    type: object
  handlers.StatisticsData:
    properties:
      persentase_alpha:
        type: number
      persentase_kehadiran:
        type: number
      rata_rata_kehadiran:
        type: number
      tanggal:
        type: string
      total_absen_hari_ini:
        type: integer
      total_alpha_hari_ini:
        type: integer
      total_kehadiran_hari_ini:
        type: integer
      total_siswa:
        type: integer
      total_tidak_hadir_hari_ini:
        type: integer
    type: object
  handlers.StatisticsResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.StatisticsData'
      message:
        type: string
    type: object
  handlers.UpdateUserStaffRequest:
    properties:
      name:
        type: string
      nip:
        type: string
      password:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  handlers.VerifyEmailOTPRequest:
    properties:
      new_email:
        type: string
      otp:
        type: string
    required:
    - new_email
    - otp
    type: object
  handlers.VerifyOTPRequest:
    properties:
      nis:
        type: string
      otp:
        type: string
    required:
    - nis
    - otp
    type: object
  handlers.VerifyQRData:
    properties:
      jenis_sholat:
        type: string
      jurusan:
        type: string
      kelas:
        type: string
      nama_siswa:
        type: string
      nis:
        type: string
      status:
        type: string
      tanggal:
        type: string
      valid:
        type: boolean
    type: object
  handlers.VerifyQRRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  handlers.VerifyQRResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.VerifyQRData'
      message:
        type: string
    type: object
  models.JadwalSholat:
    properties:
      created_at:
        type: string
      hari:
        type: string
      id_jadwal:
        type: integer
      jenis_sholat:
        type: string
      jurusan:
        type: string
      waktu_mulai:
        type: string
      waktu_selesai:
        type: string
    type: object
  models.Siswa:
    properties:
      jk:
        type: string
      jurusan:
        type: string
      kelas:
        type: string
      nama_siswa:
        type: string
      nis:
        type: string
    type: object
  models.UserStaff:
    properties:
      created_at:
        type: string
      id_staff:
        type: integer
      role:
        type: string
      username:
        type: string
    type: object
info:
  contact:
    name: API Support
  description: API untuk sistem pencatatan absensi sholat siswa
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: API Sistem Absensi Sholat
  version: 1.0.0
paths:
  /admin/query:
    post:
      consumes:
      - application/json
      description: Execute a single SELECT SQL query and return results (admin-only).
        Only single SELECT queries without semicolons are allowed.
      parameters:
      - description: Query payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.SQLQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.GenericDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Run a read-only SELECT query
      tags:
      - admin
  /admin/users_staff:
    get:
      description: Lists staff users (admin-only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.UserStaff'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List staff users
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Create a staff user (admin-only)
      parameters:
      - description: Staff payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserStaffRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UserStaff'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create staff user
      tags:
      - admin
  /admin/users_staff/{id}:
    delete:
      description: Delete a staff user and related profile records (admin-only)
      parameters:
      - description: ID staff
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete staff user
      tags:
      - admin
    get:
      description: Get a staff user by id (admin-only)
      parameters:
      - description: ID staff
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserStaff'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get staff user
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Update a staff user (admin-only)
      parameters:
      - description: ID staff
        in: path
        name: id
        required: true
        type: integer
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateUserStaffRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserStaff'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Update staff user
      tags:
      - admin
  /auth/change-email:
    post:
      consumes:
      - application/json
      description: Request OTP untuk mengubah email. OTP akan dikirim ke email baru
        untuk verifikasi
      parameters:
      - description: Email baru untuk akun
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ChangeEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP berhasil dikirim ke email baru
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Permintaan tidak valid - Email kosong, format salah, atau bukan
            email Google
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Tidak terotentikasi - Token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Email sudah digunakan oleh akun lain
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Gagal mengirim email atau error server
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Request Email Change
      tags:
      - auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Request OTP untuk reset password. OTP akan dikirim ke email yang
        terdaftar
      parameters:
      - description: NIS dan Email untuk verifikasi
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP berhasil dikirim ke email
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Permintaan tidak valid - NIS/Email kosong atau format salah
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Akun tidak ditemukan atau email tidak cocok
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Gagal mengirim email atau error server
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Request Password Reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login untuk sistem absensi menggunakan identifier (NIS untuk siswa,
        username untuk admin/guru) dan password. Mengembalikan data profil pengguna
        jika login berhasil
      parameters:
      - description: Kredensial login (identifier dan password)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login berhasil - Mengembalikan profil lengkap pengguna beserta
            token
          schema:
            $ref: '#/definitions/handlers.LoginResponseData'
        "400":
          description: Permintaan tidak valid - Identifier atau password kosong, atau
            format JSON salah
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Tidak terotentikasi - Identifier tidak ditemukan atau password
            salah
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Kesalahan server internal - Database error atau sistem error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Login Pengguna
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Mendapatkan data profil user yang sedang login (siswa atau staff)
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mendapatkan data profil
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "401":
          description: Tidak terotentikasi - Token tidak valid atau tidak ada
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Kesalahan server internal - Database error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Current User
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Mendaftarkan akun siswa baru untuk sistem absensi. Siswa harus
        memiliki NIS yang terdaftar di sistem dan menggunakan email Google
      parameters:
      - description: Data pendaftaran siswa
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Pendaftaran berhasil - Akun siswa berhasil dibuat
          schema:
            $ref: '#/definitions/handlers.RegisterResponse'
        "400":
          description: Permintaan tidak valid - NIS/Password/Email kosong, format
            email salah, atau bukan email Google
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: NIS tidak terdaftar - NIS tidak ditemukan di database siswa
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Akun sudah terdaftar - NIS sudah memiliki akun login
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Kesalahan server internal - Database error atau sistem error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Pendaftaran Siswa
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password dengan OTP yang sudah diverifikasi
      parameters:
      - description: NIS, OTP, dan password baru
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password berhasil direset
          schema:
            additionalProperties: true
            type: object
        "400":
          description: OTP tidak valid atau belum diverifikasi
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Gagal reset password
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Reset Password
      tags:
      - auth
