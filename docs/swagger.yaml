          description: 'QR code PNG image (256x256 pixels). Filename: qrcode_[JenisSholat]_[IDJadwal].png'
          schema:
            type: file
        "401":
          description: Tidak terotentikasi atau token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Akses ditolak - hanya admin, guru, atau wali kelas yang dapat
            mengakses
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Tidak ada jadwal sholat aktif saat ini
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Kesalahan server internal saat membuat QR code image
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download QR Code sebagai file PNG
      tags:
      - qrcode
  /qrcode/verify:
    post:
      consumes:
      - application/json
      description: 'Scan QR code yang sudah di-generate untuk mencatat kehadiran siswa
        dalam sesi absensi sholat. Endpoint ini memvalidasi token, memeriksa waktu
        kadaluarsa, dan mencatat absensi siswa dalam database. Token harus dalam format:
        Base64Payload.HexSignature. Hanya untuk siswa'
      parameters:
      - description: Token QR code hasil scan (dari endpoint generate atau image)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.VerifyQRRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Absensi berhasil dicatat. Menampilkan data siswa, jenis sholat,
            status kehadiran (hadir)
          schema:
            $ref: '#/definitions/handlers.VerifyQRResponse'
        "400":
          description: Token format tidak valid, format payload tidak valid, signature
            tidak valid, token sudah kadaluarsa (lebih dari 5 menit), atau QR code
            tidak valid untuk hari ini
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Tidak terotentikasi atau NIS tidak ditemukan di token JWT
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Akses ditolak - hanya siswa yang dapat mengakses
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Siswa atau jadwal sholat tidak ditemukan
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Konflik - siswa sudah absen untuk jadwal sholat ini pada hari
            yang sama
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Kesalahan server internal saat mencatat absensi
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Scan dan verifikasi QR Code untuk mencatat absensi
      tags:
      - qrcode
