  /qrcode/generate:
    get:
      consumes:
      - application/json
      description: Menghasilkan QR code untuk sesi absensi sholat aktif dan mengembalikannya
        sebagai data base64 dalam response JSON. QR code berisi token yang ter-sign
        dan berlaku selama 5 menit. Digunakan untuk menampilkan QR code di layar atau
        aplikasi mobile untuk siswa scan. Hanya untuk admin, guru, atau wali kelas
      parameters:
      - description: Set to 'true' to force-generate QR for testing (non-production
          only)
        in: query
        name: force
        type: string
      - description: Specify prayer type (e.g., Maghrib) when forcing
        in: query
        name: jenis_sholat
        type: string
      - description: Specify jadwal ID when forcing
        in: query
        name: id_jadwal
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: QR code berhasil dibuat. Berisi base64 PNG, token, waktu kadaluarsa,
            jenis sholat, dan ID jadwal
          schema:
            $ref: '#/definitions/handlers.QRCodeResponse'
        "401":
          description: Tidak terotentikasi atau token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Akses ditolak - hanya admin, guru, atau wali kelas yang dapat
            mengakses
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Tidak ada jadwal sholat aktif saat ini
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Kesalahan server internal saat membuat QR code
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Generate QR Code dengan format JSON (Base64)
      tags:
      - qrcode
