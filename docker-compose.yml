services:
  api:
    build: .
    container_name: absensholat-api
    environment:
      - DATABASE_URL=postgres://postgres:fika@db:5432/absensi_sholat_db?sslmode=disable
      - JWT_SECRET=your-secret-key
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=*
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pg-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fika
      POSTGRES_DB: absensi_sholat_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

volumes:
  pgdata:
